<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Affair - Manager Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#8B1A1A;--dark-red:#5C1010;--orange:#D4722A;--gold:#D4A43A;--light-gold:#F5E6C8;--cream:#FFF8F0;--dark:#1A1A1A;--gray:#666;--green:#2a9d2a}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--cream);color:var(--dark);line-height:1.5}

.header{background:linear-gradient(135deg,var(--dark-red),var(--red));color:white;padding:1.2rem 1rem;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header h1{font-size:1.5rem;letter-spacing:2px;font-weight:700}
.header .subtitle{font-size:.85rem;color:var(--gold);margin-top:.2rem}

.container{max-width:900px;margin:0 auto;padding:1rem}

.filter-bar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.filter-bar button{padding:.5rem 1.2rem;border:2px solid var(--gold);border-radius:25px;background:transparent;color:var(--dark);font-size:.85rem;cursor:pointer;font-weight:600;transition:.2s}
.filter-bar button.active{background:var(--gold);color:var(--dark-red)}

.no-orders{text-align:center;color:var(--gray);padding:3rem 1rem;font-size:1.1rem}

.order-card{background:white;border-radius:12px;padding:1.2rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.08);border-left:4px solid var(--orange)}
.order-card.accepted{border-left-color:var(--green)}

.order-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:.7rem}
.order-number{font-size:1.2rem;font-weight:700;color:var(--red)}
.order-time{font-size:.82rem;color:var(--gray)}
.order-type-badge{display:inline-block;padding:.2rem .6rem;border-radius:12px;font-size:.75rem;font-weight:700;text-transform:uppercase}
.badge-pickup{background:var(--light-gold);color:var(--dark-red)}
.badge-delivery{background:var(--red);color:white}

.order-customer{font-size:.9rem;margin-bottom:.5rem}
.order-customer strong{color:var(--dark)}

.order-items{background:var(--light-gold);border-radius:8px;padding:.7rem;margin-bottom:.7rem;font-size:.88rem}
.order-items .item-line{display:flex;justify-content:space-between;padding:.15rem 0}
.order-items .total-line{border-top:2px solid var(--gold);margin-top:.3rem;padding-top:.3rem;font-weight:700}

.order-meta{font-size:.82rem;color:var(--gray);margin-bottom:.7rem}
.order-meta span{margin-right:1rem}

.order-notes{font-size:.85rem;background:#fff3e0;padding:.5rem .7rem;border-radius:6px;margin-bottom:.7rem}

.order-actions{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.order-actions select{padding:.45rem .6rem;border:1px solid #ccc;border-radius:6px;font-size:.9rem;min-height:40px}
.btn-accept{padding:.5rem 1.4rem;background:var(--green);color:white;border:none;border-radius:6px;font-size:.9rem;font-weight:600;cursor:pointer;min-height:40px;transition:.15s}
.btn-accept:hover{background:#228b22}
.btn-print{padding:.5rem 1rem;background:var(--dark);color:white;border:none;border-radius:6px;font-size:.9rem;font-weight:600;cursor:pointer;min-height:40px;transition:.15s}
.btn-print:hover{background:#333}

.order-status{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .8rem;border-radius:6px;font-size:.88rem;font-weight:600}
.status-pending{background:#fff3e0;color:var(--orange)}
.status-accepted{background:#e8f5e9;color:var(--green)}

.back-link{display:inline-block;margin-bottom:1rem;color:var(--orange);text-decoration:none;font-size:.9rem;font-weight:600}
.back-link:hover{text-decoration:underline}

/* Login Gate */
.login-overlay{position:fixed;inset:0;background:var(--cream);z-index:500;display:flex;align-items:center;justify-content:center}
.login-box{background:white;border-radius:14px;padding:2rem;max-width:380px;width:90%;box-shadow:0 4px 20px rgba(0,0,0,.12);text-align:center}
.login-box h2{color:var(--red);margin-bottom:.3rem;font-size:1.4rem}
.login-box .login-subtitle{color:var(--gray);font-size:.85rem;margin-bottom:1.5rem}
.login-box input{width:100%;padding:.65rem .8rem;border:2px solid #ddd;border-radius:8px;font-size:1rem;font-family:inherit;outline:none;transition:.2s}
.login-box input:focus{border-color:var(--gold)}
.login-box .login-btn{width:100%;padding:.7rem;background:var(--red);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.8rem;transition:.15s}
.login-box .login-btn:hover{background:var(--dark-red)}
.login-error{color:#c00;font-size:.85rem;margin-top:.5rem;min-height:1.2rem}

/* Print styles */
@media print {
  body *{visibility:hidden}
  .print-ticket,.print-ticket *{visibility:visible}
  .print-ticket{position:absolute;left:0;top:0;width:100%;padding:1rem;font-size:12pt}
  .print-ticket h2{font-size:14pt;margin-bottom:.5rem}
  .print-ticket .item-line{display:flex;justify-content:space-between;padding:2px 0}
  .print-ticket .total-line{border-top:2px solid #000;margin-top:4px;padding-top:4px;font-weight:700}
}

@media(max-width:768px){
  .header h1{font-size:1.2rem}
  .container{padding:.75rem}
  .order-card{padding:1rem}
  .order-actions select,.btn-accept,.btn-print{min-height:44px;font-size:.95rem}
  .order-header{flex-direction:column}
}
</style>
</head>
<body>

<!-- Login Gate -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h2>INDIAN AFFAIR</h2>
    <div class="login-subtitle">Manager Dashboard Login</div>
    <form onsubmit="attemptLogin(event)">
      <input type="password" id="login-password" placeholder="Enter password" autofocus>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<header class="header">
  <h1>INDIAN AFFAIR</h1>
  <div class="subtitle">Manager Dashboard</div>
</header>

<div class="container" id="dashboard" style="display:none">
  <a href="index.html" class="back-link">&larr; Back to Menu</a>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;gap:.5rem">
    <div class="filter-bar" style="margin-bottom:0">
      <button class="active" onclick="setFilter('all')">All</button>
      <button onclick="setFilter('pending')">Pending</button>
      <button onclick="setFilter('accepted')">Accepted</button>
    </div>
    <div id="live-indicator" style="font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:.4rem;padding:.3rem .75rem;border-radius:20px;background:#f5f5f5;color:#999">
      <span id="live-dot" style="width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block"></span>
      <span id="live-label">Connecting…</span>
    </div>
  </div>

  <div id="orders-container">
    <div class="no-orders">No orders yet.</div>
  </div>
</div>

<!-- Hidden print ticket container -->
<div id="print-ticket-container"></div>

<script>
// ── Password Auth ─────────────────────────────────────────
// SHA-256 hash of "manager123"
const PASSWORD_HASH = '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function attemptLogin(e) {
  e.preventDefault();
  const pw = document.getElementById('login-password').value;
  const hash = await sha256(pw);
  if (hash === PASSWORD_HASH) {
    sessionStorage.setItem('ia_manager_auth', 'true');
    showDashboard();
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password. Please try again.';
    document.getElementById('login-password').value = '';
    document.getElementById('login-password').focus();
  }
}

function showDashboard() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  fetchOrders();
  setInterval(fetchOrders, 30000);
}

// Check session on load
if (sessionStorage.getItem('ia_manager_auth') === 'true') {
  showDashboard();
}

// ── Sound Alert (Web Audio API) ───────────────────────────
let audioCtx = null;
function playNewOrderSound() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Two-tone ping
  [0, 150].forEach(delay => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = delay === 0 ? 880 : 1100;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + delay / 1000);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay / 1000 + 0.3);
    osc.start(audioCtx.currentTime + delay / 1000);
    osc.stop(audioCtx.currentTime + delay / 1000 + 0.3);
  });
}

// ── State ─────────────────────────────────────────────────
let filter = 'all';
let serverAvailable = false;
let currentOrders = [];
let knownOrderNumbers = new Set();

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderOrders();
}

// ── Live Indicator ────────────────────────────────────────
function setLiveStatus(live) {
  serverAvailable = live;
  const dot = document.getElementById('live-dot');
  const label = document.getElementById('live-label');
  const wrap = document.getElementById('live-indicator');
  if (live) {
    dot.style.background = '#2a9d2a';
    label.textContent = 'Live';
    wrap.style.background = '#e8f5e9';
    wrap.style.color = '#2a9d2a';
  } else {
    dot.style.background = '#e57373';
    label.textContent = 'Offline (localStorage)';
    wrap.style.background = '#fff3e0';
    wrap.style.color = '#c0392b';
  }
}

// ── Data Fetching ─────────────────────────────────────────
async function fetchOrders() {
  try {
    const res = await fetch('/orders');
    if (!res.ok) throw new Error('non-200');
    const orders = await res.json();
    // Detect new orders for sound alert
    const newPending = orders.filter(o => o.status === 'pending' && !knownOrderNumbers.has(o.orderNumber));
    if (knownOrderNumbers.size > 0 && newPending.length > 0) {
      playNewOrderSound();
    }
    // Update known orders
    knownOrderNumbers = new Set(orders.map(o => o.orderNumber));
    currentOrders = orders;
    setLiveStatus(true);
    renderOrders();
  } catch {
    setLiveStatus(false);
    currentOrders = JSON.parse(localStorage.getItem('ia_orders') || '[]');
    knownOrderNumbers = new Set(currentOrders.map(o => o.orderNumber));
    renderOrders();
  }
}

async function acceptOrder(orderNumber, selectId) {
  const mins = document.getElementById(selectId).value;
  if (!mins) {
    alert('Please select an estimated time.');
    return;
  }
  const patch = { status: 'accepted', estimatedMins: parseInt(mins), acceptedAt: new Date().toISOString() };

  if (serverAvailable) {
    try {
      const res = await fetch('/orders/' + encodeURIComponent(orderNumber), {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(patch)
      });
      if (!res.ok) throw new Error('patch failed');
    } catch {
      // fall through to localStorage update
      updateLocalOrder(orderNumber, patch);
    }
  } else {
    updateLocalOrder(orderNumber, patch);
  }
  fetchOrders();
}

function updateLocalOrder(orderNumber, patch) {
  const orders = JSON.parse(localStorage.getItem('ia_orders') || '[]');
  const order = orders.find(o => o.orderNumber === orderNumber);
  if (order) Object.assign(order, patch);
  localStorage.setItem('ia_orders', JSON.stringify(orders));
}

function formatTime(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' ' + d.toLocaleDateString();
}

// ── Print Ticket ──────────────────────────────────────────
function printOrder(orderNumber) {
  const order = currentOrders.find(o => o.orderNumber === orderNumber);
  if (!order) return;

  const itemsHtml = order.items.map(it =>
    `<div class="item-line"><span>${it.qty}x ${it.name}</span><span>$${it.lineTotal.toFixed(2)}</span></div>`
  ).join('');

  const container = document.getElementById('print-ticket-container');
  container.innerHTML = `
    <div class="print-ticket">
      <h2>INDIAN AFFAIR RESTOBAR</h2>
      <p style="margin-bottom:.5rem;font-size:10pt;color:#666">34 Ruapehu St, Taupo | 07 378 2295</p>
      <hr style="border:1px dashed #999;margin:.5rem 0">
      <p><strong>Order:</strong> ${order.orderNumber} &nbsp; <strong>Type:</strong> ${order.orderType.toUpperCase()}</p>
      <p><strong>Time:</strong> ${formatTime(order.timestamp)}</p>
      <p><strong>Customer:</strong> ${order.customer.name} — ${order.customer.phone}</p>
      ${order.orderType === 'delivery' && order.customer.address ? `<p><strong>Deliver to:</strong> ${order.customer.address}</p>` : ''}
      <hr style="border:1px dashed #999;margin:.5rem 0">
      ${itemsHtml}
      <div class="item-line total-line"><span>Total</span><span>$${order.subtotal.toFixed(2)}</span></div>
      <hr style="border:1px dashed #999;margin:.5rem 0">
      <p><strong>Spice:</strong> ${order.spiceLevel} &nbsp; <strong>Payment:</strong> ${order.payment.replace(/-/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</p>
      ${order.instructions ? `<p><strong>Notes:</strong> ${order.instructions}</p>` : ''}
      ${order.status === 'accepted' ? `<p><strong>Est. time:</strong> ${order.estimatedMins} mins</p>` : ''}
    </div>
  `;
  window.print();
  // Clean up after print
  setTimeout(() => { container.innerHTML = ''; }, 1000);
}

// ── Render ────────────────────────────────────────────────
function renderOrders() {
  const container = document.getElementById('orders-container');
  let orders = [...currentOrders];

  // Sort newest first
  orders.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  if (filter !== 'all') {
    orders = orders.filter(o => o.status === filter);
  }

  if (orders.length === 0) {
    container.innerHTML = '<div class="no-orders">No orders found.</div>';
    return;
  }

  container.innerHTML = orders.map((o, i) => {
    const itemsHtml = o.items.map(it =>
      `<div class="item-line"><span>${it.qty}x ${it.name}</span><span>$${it.lineTotal.toFixed(2)}</span></div>`
    ).join('');

    const selectId = 'time-' + i;
    const isAccepted = o.status === 'accepted';
    const typeBadge = o.orderType === 'delivery'
      ? '<span class="order-type-badge badge-delivery">Delivery</span>'
      : '<span class="order-type-badge badge-pickup">Pickup</span>';

    const actionsHtml = isAccepted
      ? `<div class="order-status status-accepted">&#10003; Accepted &mdash; ${o.estimatedMins} mins</div>`
      : `<select id="${selectId}">
           <option value="">Est. time...</option>
           <option value="15">15 minutes</option>
           <option value="20">20 minutes</option>
           <option value="30">30 minutes</option>
           <option value="45">45 minutes</option>
           <option value="60">60 minutes</option>
         </select>
         <button class="btn-accept" onclick="acceptOrder('${o.orderNumber}','${selectId}')">Accept Order</button>`;

    return `
      <div class="order-card ${isAccepted ? 'accepted' : ''}">
        <div class="order-header">
          <div>
            <span class="order-number">${o.orderNumber}</span>
            ${typeBadge}
          </div>
          <span class="order-time">${formatTime(o.timestamp)}</span>
        </div>
        <div class="order-customer">
          <strong>${o.customer.name}</strong> &mdash; ${o.customer.phone}
          ${o.customer.email ? ' &mdash; ' + o.customer.email : ''}
        </div>
        ${o.orderType === 'delivery' && o.customer.address ? `<div class="order-customer"><strong>Deliver to:</strong> ${o.customer.address}</div>` : ''}
        <div class="order-items">
          ${itemsHtml}
          <div class="item-line total-line"><span>Total</span><span>$${o.subtotal.toFixed(2)}</span></div>
        </div>
        <div class="order-meta">
          <span>Spice: ${o.spiceLevel}</span>
          <span>Payment: ${o.payment.replace(/-/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</span>
        </div>
        ${o.instructions ? `<div class="order-notes"><strong>Notes:</strong> ${o.instructions}</div>` : ''}
        <div class="order-actions">
          ${actionsHtml}
          <button class="btn-print" onclick="printOrder('${o.orderNumber}')">&#128424; Print</button>
        </div>
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
